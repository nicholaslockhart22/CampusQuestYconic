version: "3.9"

services:
  campusquest:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATA_FILE_PATH: /app/data/db.json
      LOG_REQUESTS: "true"
    volumes:
      - campusquest_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  campusquest_data:
